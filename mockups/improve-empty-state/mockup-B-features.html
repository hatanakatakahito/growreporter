<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>B案: 機能訴求型（3カード）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif; background: #f7f8fa; }
  .bg-gradient-ai { background: linear-gradient(to right, #3b82f6, #ec4899); }
  .bg-gradient-ai:hover { background: linear-gradient(to right, #2563eb, #db2777); }
  .body-color { color: #637381; }
</style>
</head>
<body class="p-8">

<div class="mx-auto max-w-6xl">
  <!-- ヘッダー部 -->
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-xl font-bold text-gray-900">改善する</h1>
      <p class="text-sm body-color mt-1">サイトマップデータ: 最終更新 2026/4/20 （103ページ取得済み・AI改善案に反映）</p>
    </div>
    <button class="bg-gradient-ai inline-flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium text-white">
      <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
      AI改善案生成
    </button>
  </div>

  <!-- 空状態 B案: 機能訴求型 -->
  <div class="rounded-xl border border-gray-200 bg-white py-16 px-8">
    <!-- タイトル -->
    <div class="text-center mb-10">
      <h2 class="text-xl font-bold text-gray-900 mb-2">AI がサイト改善を全力でサポートします</h2>
      <p class="text-sm body-color">GA4・Search Console のデータから、成果につながる改善ポイントを自動抽出</p>
    </div>

    <!-- 3特徴カード -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-4xl mx-auto mb-10">
      <!-- カード1 -->
      <div class="rounded-lg border border-gray-100 bg-gradient-to-b from-blue-50 to-white p-5 text-center">
        <div class="h-10 w-10 rounded-lg bg-blue-100 flex items-center justify-center mx-auto mb-3">
          <svg class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        </div>
        <h3 class="text-sm font-bold text-gray-900 mb-1">データから自動抽出</h3>
        <p class="text-xs body-color leading-relaxed">PV・CV・エンゲージメントを横断分析して、成果に効く施策を特定</p>
      </div>
      <!-- カード2 -->
      <div class="rounded-lg border border-gray-100 bg-gradient-to-b from-purple-50 to-white p-5 text-center">
        <div class="h-10 w-10 rounded-lg bg-purple-100 flex items-center justify-center mx-auto mb-3">
          <svg class="h-5 w-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4"/></svg>
        </div>
        <h3 class="text-sm font-bold text-gray-900 mb-1">優先度付きで提案</h3>
        <p class="text-xs body-color leading-relaxed">期待効果・工数・費用感を算出。どれから手を付けるべきかが一目瞭然</p>
      </div>
      <!-- カード3 -->
      <div class="rounded-lg border border-gray-100 bg-gradient-to-b from-pink-50 to-white p-5 text-center">
        <div class="h-10 w-10 rounded-lg bg-pink-100 flex items-center justify-center mx-auto mb-3">
          <svg class="h-5 w-5 text-pink-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5z"/></svg>
        </div>
        <h3 class="text-sm font-bold text-gray-900 mb-1">モックアップも自動生成</h3>
        <p class="text-xs body-color leading-relaxed">Before/After を視覚的に確認。制作会社への相談もワンクリック</p>
      </div>
    </div>

    <!-- CTAボタン -->
    <div class="flex flex-col items-center gap-3">
      <button class="bg-gradient-ai inline-flex items-center gap-2 rounded-lg px-6 py-3 text-base font-semibold text-white shadow-md hover:shadow-lg transition-shadow">
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
        AI改善案を生成する
      </button>
      <button class="text-xs text-gray-500 hover:text-gray-700 underline">または手動で改善案を追加する</button>
    </div>
  </div>

  <p class="text-center text-xs body-color mt-4">B案: 機能訴求型 — 3つの特徴でAIの価値を訴求してから生成を促す</p>
</div>

</body>
</html>
