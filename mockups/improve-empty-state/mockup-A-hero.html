<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>A案: ヒーロー型（シンプル・強調）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif; background: #f7f8fa; }
  .bg-gradient-ai { background: linear-gradient(to right, #3b82f6, #ec4899); }
  .bg-gradient-ai:hover { background: linear-gradient(to right, #2563eb, #db2777); }
  .body-color { color: #637381; }
</style>
</head>
<body class="p-8">

<!-- ヘッダー部（現状維持） -->
<div class="mx-auto max-w-6xl">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-xl font-bold text-gray-900">改善する</h1>
      <p class="text-sm body-color mt-1">サイトマップデータ: 最終更新 2026/4/20 （103ページ取得済み・AI改善案に反映）</p>
    </div>
    <button class="bg-gradient-ai inline-flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium text-white">
      <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>
      AI改善案生成
    </button>
  </div>

  <!-- 空状態 A案: ヒーロー型 -->
  <div class="rounded-xl border border-gray-200 bg-white py-20 px-6">
    <div class="flex flex-col items-center gap-6 text-center max-w-xl mx-auto">
      <!-- アイコン（円背景 + 輝き） -->
      <div class="relative">
        <div class="h-24 w-24 rounded-full bg-gradient-to-br from-blue-100 to-pink-100 flex items-center justify-center">
          <svg class="h-12 w-12 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
          </svg>
        </div>
        <div class="absolute -top-1 -right-1 h-6 w-6 rounded-full bg-pink-400 animate-pulse"></div>
      </div>

      <!-- 見出し + 説明 -->
      <div class="space-y-2">
        <h2 class="text-xl font-bold text-gray-900">まずはAIに改善案を作ってもらいましょう</h2>
        <p class="text-sm body-color leading-relaxed">
          GA4・Search Console のデータとサイトマップから、AIが成果につながる改善ポイントを自動抽出します。<br>
          生成にかかる時間は約30秒です。
        </p>
      </div>

      <!-- CTAボタン -->
      <button class="bg-gradient-ai inline-flex items-center gap-2 rounded-lg px-6 py-3 text-base font-semibold text-white shadow-md hover:shadow-lg transition-shadow">
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/></svg>
        AI改善案を生成する
      </button>

      <!-- サブリンク -->
      <button class="text-xs text-gray-500 underline hover:text-gray-700">
        または手動で改善案を追加する
      </button>
    </div>
  </div>

  <p class="text-center text-xs body-color mt-4">A案: ヒーロー型 — 大きなアイコンと明確なCTAで初回体験に最適化</p>
</div>

</body>
</html>
