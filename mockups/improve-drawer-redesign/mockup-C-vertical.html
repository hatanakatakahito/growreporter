<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>C案: タブ切替で説明/モックアップ分離 + 縦積み</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { primary: '#3758F9', 'body-color': '#637381', dark: '#111928' } } } }
</script>
<style>
  body { font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif; background:#f8fafc; margin:0; }
  .shot-before { background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"><rect fill="%23ffffff" width="900" height="600"/><rect fill="%23f3f4f6" y="0" width="900" height="80"/><rect fill="%23e5e7eb" x="40" y="20" width="180" height="20" rx="4"/><rect fill="%233758F9" x="700" y="20" width="140" height="40" rx="6"/><rect fill="%231e293b" x="40" y="130" width="400" height="40" rx="4"/><rect fill="%23cbd5e1" x="40" y="190" width="820" height="12" rx="2"/><rect fill="%23cbd5e1" x="40" y="210" width="720" height="12" rx="2"/><rect fill="%23f1f5f9" x="40" y="260" width="260" height="200" rx="8"/><rect fill="%23f1f5f9" x="320" y="260" width="260" height="200" rx="8"/><rect fill="%23f1f5f9" x="600" y="260" width="260" height="200" rx="8"/></svg>') center/cover; }
  .shot-after { background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"><rect fill="%23ffffff" width="900" height="600"/><rect fill="%23f3f4f6" y="0" width="900" height="80"/><rect fill="%23e5e7eb" x="40" y="20" width="180" height="20" rx="4"/><rect fill="%233758F9" x="700" y="20" width="140" height="40" rx="6"/><rect fill="%231e293b" x="40" y="130" width="400" height="40" rx="4"/><rect fill="%23cbd5e1" x="40" y="190" width="820" height="12" rx="2"/><rect fill="%23cbd5e1" x="40" y="210" width="720" height="12" rx="2"/><rect fill="%23f1f5f9" x="40" y="260" width="260" height="160" rx="8"/><rect fill="%23f1f5f9" x="320" y="260" width="260" height="160" rx="8"/><rect fill="%23f1f5f9" x="600" y="260" width="260" height="160" rx="8"/><rect fill="%23eff6ff" stroke="%233758F9" stroke-width="3" x="40" y="440" width="820" height="110" rx="12"/><rect fill="%233758F9" x="360" y="470" width="180" height="50" rx="25"/></svg>') center/cover; }
</style>
</head>
<body>

<div class="p-8 text-xs text-gray-400">メインコンテンツ（背景）...</div>

<div class="fixed inset-0 z-[100]">
  <div class="absolute inset-0 bg-black/30"></div>
  <div class="absolute top-0 bottom-0 right-0 w-full sm:w-[85vw] max-w-[1400px] bg-white shadow-2xl flex flex-col">

    <!-- ヘッダー（実コード同じ） -->
    <div class="px-4 sm:px-10 py-5 border-b border-gray-200 shrink-0">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-bold text-dark flex-1 min-w-0 mr-4">施工事例ページにおける「建設事業」カテゴリへのCTA強化</h2>
        <button class="text-gray-400 p-2 rounded-lg">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="flex items-center gap-3 flex-wrap">
        <a href="#" class="inline-flex items-center gap-1 text-xs text-primary hover:underline">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          対象ページを開く
        </a>
        <span class="text-gray-300">|</span>
        <span class="px-2.5 py-1 rounded text-xs font-semibold bg-green-100 text-green-700">機能</span>
        <span class="px-2.5 py-1 rounded text-xs font-semibold bg-red-100 text-red-700">優先度: 高</span>
        <div class="ml-auto flex items-center gap-2">
          <div class="relative inline-block">
            <select class="appearance-none text-sm border border-gray-200 rounded-lg pl-3 pr-8 py-1.5 cursor-pointer bg-white text-dark">
              <option>起案</option>
            </select>
          </div>
          <button class="text-sm text-gray-500 border border-gray-200 rounded-lg px-3 py-1.5">編集</button>
        </div>
      </div>
    </div>

    <!-- トップレベルタブ（C案の特徴） -->
    <div class="px-4 sm:px-10 pt-3 border-b border-gray-200 bg-white shrink-0">
      <div class="flex items-end gap-6">
        <button class="pb-3 text-sm font-bold text-primary border-b-2 border-primary -mb-px flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h18"/></svg>
          改善モックアップ
        </button>
        <button class="pb-3 text-sm font-medium text-gray-500 hover:text-gray-700 flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          改善内容の詳細
        </button>
      </div>
    </div>

    <!-- 常時表示サマリ（タブ下） -->
    <div class="px-4 sm:px-10 py-2.5 bg-gray-50 border-b border-gray-200 flex items-center gap-4 text-xs shrink-0">
      <div class="flex items-center gap-1.5 text-green-700 font-semibold">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        期待効果: お問い合わせ +3〜5件/月
      </div>
      <span class="text-gray-300">|</span>
      <div class="text-gray-700"><span class="text-green-600 font-bold">¥</span> <span class="font-semibold">24万円〜</span></div>
      <span class="text-gray-300">|</span>
      <div class="text-gray-700">📆 <span class="font-semibold">5営業日〜</span></div>
      <p class="ml-auto text-[10px] text-gray-400">※AI算出の目安</p>
    </div>

    <!-- メインコンテンツ: 縦積み -->
    <div class="flex-1 overflow-y-auto bg-gray-50/50">
      <!-- Before -->
      <div class="px-4 sm:px-10 py-5 border-b border-gray-200">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Before（現在）</span>
          </div>
          <button class="text-[11px] text-primary hover:underline">↗ 実サイトを開く</button>
        </div>
        <div class="rounded-xl overflow-hidden border border-gray-200 shadow-lg bg-white">
          <div class="flex items-center gap-2 bg-gray-100 px-3 py-2 border-b border-gray-200">
            <span class="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <div class="flex-1 mx-2 rounded bg-white px-3 py-0.5 text-[10px] text-gray-400 truncate">https://www.kudo.co.jp/works/</div>
          </div>
          <div class="shot-before h-[520px] w-full"></div>
        </div>
      </div>

      <!-- After -->
      <div class="px-4 sm:px-10 py-5">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold text-primary uppercase tracking-wider">After（改善案適用後）</span>
            <span class="rounded-full bg-green-100 px-2 py-0.5 text-[9px] font-bold text-green-700">AI生成</span>
          </div>
          <button class="text-[11px] text-primary hover:underline">↗ フルスクリーンで表示</button>
        </div>
        <div class="rounded-xl overflow-hidden border-2 border-primary/30 shadow-lg bg-white">
          <div class="flex items-center gap-2 bg-gray-100 px-3 py-2 border-b border-gray-200">
            <span class="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <div class="flex-1 mx-2 rounded bg-white px-3 py-0.5 text-[10px] text-gray-400 truncate">https://www.kudo.co.jp/works/</div>
          </div>
          <div class="shot-after h-[520px] w-full"></div>
        </div>
      </div>
    </div>

    <!-- フッター（実コード同じ） -->
    <div class="px-4 sm:px-10 py-4 border-t border-gray-200 flex items-center justify-between shrink-0 bg-gray-50/80">
      <div class="flex items-center gap-3">
        <button class="inline-flex items-center gap-1.5 rounded-lg bg-gradient-to-r from-blue-500 to-pink-500 px-4 py-2 text-sm font-medium text-white shadow-sm">
          ✉ 制作会社に相談する
        </button>
        <button class="text-sm text-red-600 border border-red-200 rounded-lg px-3 py-1.5">削除</button>
      </div>
      <div class="flex items-center gap-2 text-sm text-gray-500">
        <button class="px-3 py-1.5 rounded border">‹ 前</button>
        <span class="text-xs">6 / 12</span>
        <button class="px-3 py-1.5 rounded border">次 ›</button>
      </div>
    </div>
  </div>
</div>

<p class="fixed bottom-3 left-1/2 -translate-x-1/2 text-xs text-white bg-black/70 px-3 py-1 rounded-full z-[110]">
  C案: トップレベルタブ（モックアップ/詳細）+ 縦積みで Before/After を画面幅いっぱい
</p>

</body>
</html>
